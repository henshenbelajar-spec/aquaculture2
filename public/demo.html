<!doctype html>
<html lang="en" class="scroll-smooth" style="color-scheme: dark">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta
            name="description"
            content="Watch the AquaSmart platform demo video."
        />
        <meta name="theme-color" content="#071121" />
        <title>AquaSmart | Watch Demo</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="/build/assets/app.css" />
        <style>
            body {
                font-family: "Outfit", sans-serif;
                background:
                    radial-gradient(
                        circle at top,
                        rgba(0, 240, 255, 0.14),
                        transparent 30%
                    ),
                    linear-gradient(
                        180deg,
                        #071121 0%,
                        #08192d 48%,
                        #071121 100%
                    );
            }

            .demo-shell {
                background: linear-gradient(
                    180deg,
                    rgba(10, 25, 42, 0.88),
                    rgba(6, 14, 26, 0.94)
                );
                border: 1px solid rgba(168, 232, 255, 0.12);
                box-shadow:
                    0 40px 90px -56px rgba(0, 0, 0, 0.86),
                    0 24px 54px -38px rgba(0, 240, 255, 0.18),
                    inset 0 1px 0 rgba(255, 255, 255, 0.06);
            }

            .demo-video-wrap {
                position: relative;
                overflow: hidden;
                border-radius: 2rem;
                border: 1px solid rgba(255, 255, 255, 0.08);
                background:
                    radial-gradient(
                        circle at top,
                        rgba(0, 240, 255, 0.1),
                        transparent 30%
                    ),
                    rgba(5, 12, 22, 0.95);
                box-shadow:
                    0 28px 64px -42px rgba(2, 8, 18, 0.9),
                    inset 0 1px 0 rgba(255, 255, 255, 0.04);
            }

            .demo-video-wrap::after {
                content: "";
                position: absolute;
                inset: auto 8% -18% 8%;
                height: 26%;
                border-radius: 999px;
                background: radial-gradient(
                    circle,
                    rgba(0, 240, 255, 0.18),
                    transparent 70%
                );
                filter: blur(18px);
                pointer-events: none;
            }

            .demo-video {
                display: block;
                width: 100%;
                height: auto;
                aspect-ratio: 16 / 9;
                background: #02070f;
            }
        </style>
    </head>

    <body class="min-h-screen overflow-x-hidden text-white antialiased">
        <main class="relative min-h-screen px-6 py-8 md:px-10 lg:px-12">
            <div class="mx-auto flex min-h-[calc(100vh-4rem)] max-w-6xl flex-col justify-center">
                <div class="reveal-up demo-shell rounded-[2.25rem] p-6 md:p-8 lg:p-10">
                    <div class="mb-8 flex flex-col gap-5 md:flex-row md:items-center md:justify-between">
                        <div>
                            <a
                                href="/"
                                class="inline-flex items-center gap-2 rounded-full border border-white/10 bg-white/5 px-4 py-2 text-xs font-semibold uppercase tracking-[0.24em] text-[#91EFFF] transition hover:border-[#00F0FF]/40 hover:bg-[#00F0FF]/10"
                            >
                                <span aria-hidden="true">&larr;</span>
                                Back to Home
                            </a>
                            <h1 class="mt-5 text-4xl font-bold tracking-tight text-white md:text-6xl">
                                Watch Demo
                            </h1>
                            <p class="mt-4 max-w-2xl text-base leading-relaxed text-[#97A8BD] md:text-lg">
                                Explore the AquaSmart demo video in a focused playback view. Use full screen, scrub the
                                timeline, or unmute directly from the player.
                            </p>
                        </div>

                        <div class="rounded-[1.75rem] border border-white/10 bg-white/5 px-5 py-4 backdrop-blur-md">
                            <div class="text-[11px] font-bold uppercase tracking-[0.24em] text-[#91EFFF]">
                                Demo Source
                            </div>
                            <div class="mt-2 text-sm font-medium text-white">
                                AquaSmart Product Walkthrough
                            </div>
                            <div class="mt-1 text-sm text-[#8CA1B6]">
                                MP4 video, local project asset
                            </div>
                        </div>
                    </div>

                    <div class="demo-video-wrap reveal-up reveal-delay-100 p-3 md:p-4">
                        <video
                            class="demo-video rounded-[1.4rem]"
                            controls
                            playsinline
                            preload="metadata"
                            autoplay
                            src="/videos/aquasmart-demo.mp4"
                        >
                            Your browser does not support the video tag.
                        </video>
                    </div>
                </div>
            </div>
        </main>

        <script type="module" src="/build/assets/app2.js"></script>
    </body>
</html>
